<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>統計データ一覧 | GeoFlag</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 検索ドロップダウン */
    #searchDropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 100;
      background: #fff;
      border: 1px solid #d1d5db;
      border-top: none;
      border-radius: 0 0 0.75rem 0.75rem;
      max-height: 320px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    #searchDropdown li {
      padding: 0.6rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.95rem;
      border-bottom: 1px solid #f3f4f6;
    }
    #searchDropdown li:last-child { border-bottom: none; }
    #searchDropdown li:hover, #searchDropdown li.active { background: #eff6ff; }
    #searchDropdown li img { width: 1.8rem; height: 1.2rem; object-fit: contain; border-radius: 2px; flex-shrink: 0; }
    #searchWrapper { position: relative; }
    #statsMapFrame {
      width: 100%;
      height: max(520px, calc(100vh - 340px));
      border: none;
      border-radius: 0.75rem;
      display: block;
    }
    @media (max-width: 640px) {
      #countryList > div span {
        font-size: 0.75rem; /* text-xs */
        line-height: 1rem;
      }
      #countryList > div {
        padding: 0.75rem; /* p-3 */
      }
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-900">
  <div class="container mx-auto py-8 px-4">
    <!-- タブナビゲーション -->
    <div class="mb-6 border-b border-gray-300">
      <div class="flex gap-1 sm:gap-2 flex-nowrap">
        <button id="tabStatsMap" class="flex-1 min-w-0 px-2 sm:px-6 py-2 sm:py-3 font-semibold text-xs sm:text-lg whitespace-nowrap border-b-4 border-blue-500 text-blue-600">
          統計マップ
        </button>
        <button id="tabRanking" class="flex-1 min-w-0 px-2 sm:px-6 py-2 sm:py-3 font-semibold text-xs sm:text-lg whitespace-nowrap border-b-4 border-transparent text-gray-500 hover:text-gray-700">
          統計ランキング
        </button>
        <button id="tabCountryList" class="flex-1 min-w-0 px-2 sm:px-6 py-2 sm:py-3 font-semibold text-xs sm:text-lg whitespace-nowrap border-b-4 border-transparent text-gray-500 hover:text-gray-700">
          国一覧
        </button>
      </div>
    </div>

    <!-- 地域フィルタ（国一覧・ランキングタブで共通） -->
    <div id="regionSection" class="mb-6">
      <div class="mb-3 flex items-center gap-3">
        <h2 class="text-lg font-bold text-gray-700 flex items-center whitespace-nowrap">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          地域選択
        </h2>

        <!-- 国一覧タブ専用: 国検索バー（同じ行の右側） -->
        <div id="countryListSearchSection" class="hidden ml-auto w-1/2 max-w-[320px] min-w-[180px]">
          <div id="searchWrapper">
            <div class="flex items-center gap-1.5 bg-white rounded-lg shadow px-2 py-1.5 border border-gray-200 focus-within:ring-2 focus-within:ring-blue-400 transition">
              <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z"/>
              </svg>
              <input id="countrySearchInput" type="text" placeholder="国名で検索…" autocomplete="off" spellcheck="false"
                class="flex-1 outline-none text-sm bg-transparent placeholder-gray-400" />
              <button id="searchClearBtn" class="hidden text-gray-400 hover:text-gray-600" aria-label="クリア">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
            <ul id="searchDropdown" class="hidden"></ul>
          </div>
        </div>
      </div>
      <div id="regionButtons" class="w-full flex flex-nowrap gap-2 overflow-x-auto pb-1"></div>
    </div>
    
    <!-- 国一覧タブの内容 -->
    <div id="countryListTab" class="tab-content hidden">
      <div id="countryList" class="grid grid-cols-4 gap-4"></div>
    </div>
    
    <!-- 統計ランキングタブの内容 -->
    <div id="rankingTab" class="tab-content hidden">
      <div class="mb-6">
        <h2 class="text-lg font-bold text-gray-700 mb-3 flex items-center">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
          </svg>
          統計指標選択
        </h2>
        <div id="indicatorButtons" class="flex flex-wrap gap-2"></div>
      </div>
      <div id="rankingTable" class="mb-4"></div>
    </div>

    <!-- 統計マップタブの内容 -->
    <div id="statsMapTab" class="tab-content">
      <!-- 指標選択UI（統計ランキングと同じスタイル） -->
      <div class="mb-4">
        <div class="mb-3 flex items-center gap-3">
          <h2 class="text-lg font-bold text-gray-700 flex items-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
            </svg>
            表示指標選択
          </h2>
        </div>
        <div id="mapIndicatorButtons" class="w-full"></div>
      </div>
      <iframe id="statsMapFrame" src="" title="統計マップ" allowfullscreen></iframe>
    </div>
    
    <button onclick="window.location.href='index.html'" class="fixed bottom-6 right-6 px-6 py-2 bg-gray-500 text-white rounded shadow hover:bg-gray-600 transition z-50">トップに戻る</button>
  </div>
  <!-- Leaflet.js for OpenStreetMap -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="country_list.js"></script>
</body>
</html>
